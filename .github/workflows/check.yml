name: Beach holiday scan

on:
  schedule:
    - cron: "0 6 * * *"        # 06:00 UTC daily
  workflow_dispatch:

# A slow API run must never overlap with the next scheduled one.
concurrency:
  group: beach-scan
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    # Hard ceiling. The old 40-minute default meant a degraded API burned
    # the whole budget before failing. Direct-only made the scan much
    # shorter, so 25 minutes is generous and fails fast when it isn't.
    timeout-minutes: 45

    steps:
      - name: Check out
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run scan
        env:
          TP_TOKEN: ${{ secrets.TP_TOKEN }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          HOTEL_SPLIT: "1"
        run: python check_beach.py

      - name: Commit updated data
        run: |
          git config user.name  "beach-bot"
          git config user.email "beach-bot@users.noreply.github.com"
          git add -A deals.json price_history.json
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Scan $(date -u '+%Y-%m-%d %H:%M UTC')"
            # Retry once: a manual push from the laptop can land mid-run.
            git push || (git pull --rebase --autostash && git push)
          fi
